# Прод-стек Navbat: docker compose -f docker-compose.prod.yml up -d
# Запускать из deploy/; конфигурация — deploy/.env (см. .env.example).
# nginx/certbot добавляются в C-2, backup-sidecar — в C-5.
services:
  # named volume отдаётся root'ом, archive_command от postgres писать
  # в него не сможет — одноразовый chown до старта БД
  wal-perms:
    image: postgres:16-alpine
    user: root
    entrypoint: ["/bin/sh", "-c", "chown postgres:postgres /wal_archive && chmod 700 /wal_archive"]
    volumes:
      - wal_archive:/wal_archive
    restart: "no"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # WAL-архив для PITR: test ! -f защищает от перезаписи сегмента
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=test ! -f /wal_archive/%f && cp %p /wal_archive/%f
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${NAVBAT_PG_PASSWORD:?задай в deploy/.env}
      POSTGRES_DB: navbat
      NAVBAT_APP_PASSWORD: ${NAVBAT_APP_PASSWORD:?задай в deploy/.env}
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
      - wal_archive:/wal_archive
    depends_on:
      wal-perms:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d navbat"]
      interval: 5s
      timeout: 3s
      retries: 12
    # порт наружу НЕ публикуем: БД доступна только внутри compose-сети

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    # тег = git SHA при деплое (NAVBAT_IMAGE_TAG в .env) — откат на
    # предыдущий образ одной строкой; см. docs/DEPLOY.md
    image: navbat:${NAVBAT_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # внутри compose-сети postgres живёт на :5432 под именем сервиса
      NAVBAT_ADMIN_DSN: postgresql+psycopg://postgres:${NAVBAT_PG_PASSWORD}@postgres:5432/navbat
      NAVBAT_APP_DSN: postgresql+psycopg://navbat_app:${NAVBAT_APP_PASSWORD}@postgres:5432/navbat
      NAVBAT_CERT_PATH: /etc/letsencrypt/live/${NAVBAT_DOMAIN:-unset}/fullchain.pem
      NAVBAT_LOG_FORMAT: json
      # /health следит за свежестью бэкапов (тихая смерть sidecar = алерт)
      NAVBAT_BACKUP_DIR: /backups
      NAVBAT_BACKUP_INTERVAL_SEC: ${NAVBAT_BACKUP_INTERVAL_SEC:-7200}
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - backups:/backups:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8080/health?check=db', timeout=5); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    # polling-цикл проверяет stop раз в long-poll (до 30 с) — даём время
    stop_grace_period: 40s

  # web-профиль: только на VPS с доменом; локальный smoke его не поднимает
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NAVBAT_DOMAIN: ${NAVBAT_DOMAIN:-unset}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - app
    profiles: ["web"]

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c",
                 "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    profiles: ["web"]

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${NAVBAT_PG_PASSWORD}
      NAVBAT_BACKUP_INTERVAL_SEC: ${NAVBAT_BACKUP_INTERVAL_SEC:-7200}
      NAVBAT_BACKUP_KEEP: ${NAVBAT_BACKUP_KEEP:-12}
      NAVBAT_BACKUP_RCLONE_REMOTE: ${NAVBAT_BACKUP_RCLONE_REMOTE:-}
    volumes:
      - ./scripts/backup-loop.sh:/backup-loop.sh:ro
      - backups:/backups
    entrypoint: ["/bin/sh", "/backup-loop.sh"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  wal_archive:
  backups:
  letsencrypt:
  certbot-webroot:
